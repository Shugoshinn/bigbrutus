server:
  port: 0

# EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

# MYSQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bd_vendedores
    username: root
    password: ""

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # FLYWAY
  flyway:
    enabled: true

  cloud:
    config:
      enabled: false
