server:
  port: 0

# EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

# CONFIGURACION DE credenciales de MYSQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bd_pedidos
    username: root
    password: ""

  # CONFIGURACION DE SPRING CON MYSQL
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # CONFIGURACION DE FLYWAY
  flyway:
    enabled: true
    baseline-on-migrate: true